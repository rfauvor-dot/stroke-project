<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Reclaim — Speech Practice</title>
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --surface-alt: #EFEAE2;
    --border: #DDD6CC;
    --text: #26221C;
    --text-2: #6E675E;
    --green: #3E7A57;
    --green-dim: #E3EFE7;
    --accent: #B85C43;
    --accent-dim: #F3E2DC;
    --blue: #3B6B8A;
    --blue-dim: #DFEAF1;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 17px; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 1.25rem 1.25rem 5.5rem; }
  /* the bottom nav is hidden during a session — don't reserve space for it */
  #app.no-nav { padding-bottom: 1.25rem; }

  h1, h2 { font-family: Georgia, serif; letter-spacing: -0.01em; line-height: 1.2; text-wrap: balance; }
  h1 { font-size: 1.7rem; } h2 { font-size: 1.3rem; }
  .muted { color: var(--text-2); }
  .small { font-size: 0.85rem; }

  /* buttons — 44px+ targets, always */
  .btn {
    display: block; width: 100%; min-height: 56px;
    border: none; border-radius: var(--radius);
    font-size: 1.15rem; font-weight: 600; font-family: inherit;
    cursor: pointer; padding: 0.9rem 1.2rem; margin-top: 0.75rem;
  }
  .btn:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 2px solid var(--border); }
  .btn-quiet { background: none; color: var(--text-2); font-size: 0.95rem; min-height: 44px; }
  .btn-cue { background: var(--blue-dim); color: var(--blue); }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.1rem 1.4rem; margin-top: 0.85rem;
  }

  /* session card */
  .word-image { font-size: 4.5rem; text-align: center; line-height: 1.15; margin: 0.25rem 0; }
  .icon-pic { display: inline-block; width: 4rem; height: 4rem; color: var(--blue); vertical-align: middle; }
  .pic-wrap { display: block; }
  .real-photo { display: block; width: 100%; max-width: 240px; height: 150px; object-fit: cover; border-radius: 12px; margin: 0 auto; }
  .icon-pic svg { width: 100%; height: 100%; }
  .feature-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue); display: block; }

  /* single progressive hint — replaces the old six-box feature grid so the
     card never needs scrolling, and every reveal counts toward hint tracking */
  .hint-progress { display: flex; gap: 5px; justify-content: center; margin: 0.75rem 0 0.25rem; }
  .hint-progress span { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .hint-progress span.used { background: var(--blue); }
  .hint-box {
    background: var(--blue-dim); border: 2px solid var(--blue); border-radius: var(--radius);
    padding: 0.9rem 1.1rem; margin-top: 0.6rem; min-height: 52px;
  }
  .hint-box .feature-label { margin-bottom: 0.25rem; }
  .hint-box p { font-size: 1.05rem; color: var(--text); margin: 0; }
  .btn-hint-count { font-size: 0.78rem; color: var(--text-2); text-align: center; margin-top: 0.3rem; }
  .cue-text { font-size: 1.3rem; text-align: center; margin: 1rem 0; font-family: Georgia, serif; }
  .word-reveal { font-size: 2.4rem; font-weight: 700; text-align: center; font-family: Georgia, serif; margin: 0.75rem 0; }

  .progress-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 1rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
  .dot.done { background: var(--green); }
  .dot.now { background: var(--accent); }

  .streak-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--accent-dim); color: var(--accent);
    border-radius: 999px; padding: 0.35rem 0.9rem; font-weight: 700; font-size: 0.95rem;
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 1rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; text-align: center; }
  .stat b { font-family: Georgia, serif; font-size: 1.8rem; display: block; color: var(--green); font-variant-numeric: tabular-nums; }
  .stat span { font-size: 0.8rem; color: var(--text-2); }

  /* adherence calendar */
  .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 0.75rem; }
  .cal div { aspect-ratio: 1; border-radius: 6px; background: var(--surface-alt); }
  .cal .did { background: var(--green); }
  .cal .fat { background: var(--accent); }

  /* sparkline */
  .spark { width: 100%; height: 72px; margin-top: 0.5rem; }

  .evidence-note {
    font-size: 0.78rem; color: var(--text-2); text-align: center;
    margin-top: 1.25rem; padding-top: 0.75rem; border-top: 1px solid var(--border);
  }

  /* bottom nav */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; justify-content: center; gap: 0.25rem; padding: 0.4rem 0.5rem calc(0.4rem + env(safe-area-inset-bottom));
  }
  nav button {
    flex: 1; max-width: 130px; min-height: 52px; border: none; background: none;
    font-family: inherit; font-size: 0.82rem; color: var(--text-2); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px; border-radius: 10px;
  }
  nav button.active { color: var(--green); font-weight: 700; background: var(--green-dim); }
  nav button .ico { font-size: 1.3rem; }

  input[type=text] {
    width: 100%; min-height: 52px; font-size: 1.05rem; font-family: inherit;
    border: 2px solid var(--border); border-radius: var(--radius); padding: 0.6rem 0.9rem; margin-top: 0.5rem;
    background: var(--surface); color: var(--text);
  }
  .scale-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  .scale-row button {
    flex: 1; min-height: 52px; border: 2px solid var(--border); border-radius: 10px;
    background: var(--surface); font-size: 1.1rem; font-weight: 700; font-family: inherit; cursor: pointer; color: var(--text);
  }
  .scale-row button.sel { background: var(--green); border-color: var(--green); color: #fff; }

  .fatigue-note { background: var(--blue-dim); border-radius: var(--radius); padding: 1rem 1.2rem; margin-top: 1rem; font-size: 0.95rem; }
  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise 0.25s ease-out; }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  }
</style>
</head>
<body>
  <div id="app"></div>
  <nav id="nav" hidden>
    <button data-view="home"><span class="ico">🏠</span>Home</button>
    <button data-view="progress"><span class="ico">🌱</span>Progress</button>
    <button data-view="caregiver"><span class="ico">🤝</span>Care Partner</button>
  </nav>
  <script type="module" src="./app.js"></script>
</body>
</html>
